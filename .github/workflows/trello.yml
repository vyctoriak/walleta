name: Trello Integration

on:
  pull_request:
    types: [opened, closed]

jobs:
  trello:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Trello Card ID from branch
        id: extract
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Branch: $BRANCH_NAME"

          if [[ $BRANCH_NAME =~ \#([a-zA-Z0-9]+) ]]; then
            echo "card_id=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "No Trello card ID found in branch name"
            exit 1
          fi

      - name: Comment on Trello when PR is opened
        if: github.event.action == 'opened'
        run: |
          curl -s -X POST "https://api.trello.com/1/cards/${{ steps.extract.outputs.card_id }}/actions/comments" \
          --data-urlencode "text=🚀 PR aberto: ${{ github.event.pull_request.html_url }}" \
          --data "key=${{ secrets.TRELLO_API_KEY }}" \
          --data "token=${{ secrets.TRELLO_TOKEN }}"

      - name: Comment on Trello when PR is merged
        if: github.event.pull_request.merged == true
        run: |
          curl -s -X POST "https://api.trello.com/1/cards/${{ steps.extract.outputs.card_id }}/actions/comments" \
          --data-urlencode "text=✅ PR mergeado!" \
          --data "key=${{ secrets.TRELLO_API_KEY }}" \
          --data "token=${{ secrets.TRELLO_TOKEN }}"